<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="StamenicFitt"/>
<meta name="theme-color" content="#111"/>
<title>StamenicFitt</title>
<style>
:root{--bg:#fff;--bg2:#f5f5f5;--bg3:#eee;--text:#111;--text2:#444;--text3:#888;--red:#cc2200;--red2:#ff3311;--redbg:#fff0ee;--border:#e0e0e0;--border2:#ccc;--green:#1a7a2e;--gbg:#eaf5ec;--amber:#7a4f00;--abg:#fff3e0;--gray:#666;--graybg:#f0f0f0;--r:10px;--rs:7px;--sb:env(safe-area-inset-bottom,0px)}
.dark{--bg:#111;--bg2:#1c1c1c;--bg3:#252525;--text:#f0f0f0;--text2:#aaa;--text3:#666;--red:#ff4422;--red2:#ff6644;--redbg:#2a0a00;--border:#2a2a2a;--border2:#3a3a3a;--green:#4caf50;--gbg:#0a2010;--amber:#ffb74d;--abg:#2a1800;--gray:#888;--graybg:#252525}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg)}
#app{height:100%;display:flex;flex-direction:column;background:var(--bg);color:var(--text)}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 0;flex-shrink:0}
.hdr-logo{display:flex;align-items:center;gap:8px}
.hdr-icon{width:30px;height:30px;background:#111;border-radius:6px;display:flex;align-items:center;justify-content:center}
.dark .hdr-icon{background:#cc2200}
.hdr-name{font-size:14px;font-weight:800;color:var(--text);letter-spacing:.5px}
.hdr-name span{color:var(--red)}
.hdr-btn{background:none;border:1px solid var(--border2);border-radius:var(--rs);padding:5px 10px;font-size:14px;cursor:pointer;color:var(--text)}
.content{flex:1;overflow-y:auto;padding:14px;padding-bottom:calc(68px + var(--sb));-webkit-overflow-scrolling:touch}
.bnav{background:var(--bg);border-top:1px solid var(--border);display:flex;padding-bottom:var(--sb);flex-shrink:0}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px;cursor:pointer;gap:2px;border:none;background:none}
.ni span{font-size:9px;color:var(--text3)}
.ni svg{color:var(--text3)}
.ni.on svg{color:var(--red)}
.ni.on span{color:var(--red);font-weight:700}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ptitle{font-size:20px;font-weight:700;color:var(--text)}
/* BUTTONS */
.btn{background:transparent;border:1px solid var(--border2);border-radius:var(--rs);padding:7px 14px;font-size:13px;cursor:pointer;color:var(--text);font-family:inherit;transition:opacity .15s}
.btn:active{opacity:.6}
.btnp{background:var(--red);color:#fff;border-color:var(--red);font-weight:600}
.btng{background:var(--gbg);color:var(--green);border-color:var(--green)}
.btnr{background:var(--redbg);color:var(--red);border-color:var(--red)}
.btna{background:var(--abg);color:var(--amber);border-color:var(--amber)}
.btnsm{font-size:12px;padding:5px 10px}
/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sc{background:var(--bg2);border-radius:var(--rs);padding:12px;border:1px solid var(--border)}
.sl{font-size:11px;color:var(--text3);margin-bottom:3px}
.sv{font-size:20px;font-weight:700;color:var(--text)}
/* CARDS */
.clist{display:flex;flex-direction:column;gap:8px}
.cc{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.cc.trained{border-color:var(--red);background:var(--redbg)}
.cc.expiring{border-color:var(--amber)}
.cc.completed{border-color:var(--green);background:var(--gbg)}
.ctop{display:flex;align-items:center;gap:10px}
.chk{width:28px;height:28px;border:2px solid var(--border2);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg)}
.chk.on{background:var(--red);border-color:var(--red)}
.chk svg{display:none}
.chk.on svg{display:block}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;background:var(--redbg);color:var(--red);border:1.5px solid var(--border)}
.ci{flex:1;min-width:0}
.cn{font-size:15px;font-weight:600;color:var(--text);cursor:pointer}
.cn:hover{color:var(--red)}
.cmeta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.cwarn{font-size:11px;color:var(--amber);margin-top:3px;font-weight:500}
.cstamp{font-size:11px;color:var(--red);margin-top:3px;font-weight:500}
.crenew{font-size:11px;color:var(--green);margin-top:3px;font-weight:500}
.cdone{font-size:11px;color:var(--green);margin-top:3px;font-weight:600}
.cr{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.bdg{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.ba{background:var(--gbg);color:var(--green)}
.bd{background:var(--abg);color:var(--amber)}
.bo{background:var(--redbg);color:var(--red)}
.bp{background:var(--graybg);color:var(--gray)}
.bar2{background:var(--graybg);color:var(--gray)}
.ptag{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--redbg);color:var(--red);font-weight:500}
.prow{display:flex;align-items:center;gap:6px;margin-top:6px}
.pbar{height:5px;background:var(--bg3);border-radius:3px;flex:1}
.pfill{height:5px;border-radius:3px;background:var(--red)}
.pfill.full{background:var(--green)}
.plbl{font-size:10px;color:var(--text3);white-space:nowrap}
.cact{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.tchip{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap}
.tcp{background:#e8f0fe;color:#1a56db}
.tcs{background:#e8fff3;color:#059669}
.tcg{background:var(--redbg);color:var(--red)}
.grpchip{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap;border:1px solid}
/* NOTIF */
.notif{background:var(--abg);border:1px solid var(--amber);border-radius:var(--rs);padding:10px 14px;margin-bottom:12px;display:none}
.notif.on{display:block}
.notif.green{background:var(--gbg);border-color:var(--green)}
.ntitle{font-size:12px;font-weight:700;color:var(--amber);margin-bottom:4px}
.ntitle.green{color:var(--green)}
.nitem{font-size:12px;color:var(--amber);padding:2px 0}
.nitem.green{color:var(--green)}
/* SEARCH */
.sw{margin-bottom:12px}
.sw input{width:100%;padding:10px 14px;font-size:15px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg2);color:var(--text);font-family:inherit}
/* FILTER */
.frow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.fbtn{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);font-size:12px;cursor:pointer;color:var(--text);font-family:inherit}
.fbtn.on{font-weight:700}
/* PAKETI */
.pkgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px;margin-bottom:14px}
.pkc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;position:relative}
.pkn{font-size:34px;font-weight:800;color:var(--red)}
.pks{font-size:12px;color:var(--text3);margin-bottom:6px}
.pkp{font-size:19px;font-weight:700;color:var(--text)}
.pknm{font-size:11px;color:var(--red);font-weight:500;margin-top:3px}
/* GRUPE */
.grpcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.grphdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.grpname{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.mrow{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg);border:.5px solid var(--border);border-radius:var(--rs);margin-bottom:4px}
.mname{font-size:13px;color:var(--text)}
/* RASPORED */
.wnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.wlbl{font-size:15px;font-weight:700;color:var(--text)}
.swrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -14px;padding:0 14px}
.stable{display:grid;min-width:520px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.shead{display:grid;grid-template-columns:48px repeat(7,1fr);background:var(--bg2);border-bottom:1px solid var(--border)}
.shc{padding:7px 3px;text-align:center;font-size:11px;font-weight:700;color:var(--text2)}
.shc.td{color:var(--red)}
.srow{display:grid;grid-template-columns:48px repeat(7,1fr);border-bottom:.5px solid var(--border)}
.srow:last-child{border-bottom:none}
.stime{padding:5px 6px 5px 3px;text-align:right;font-size:10px;color:var(--text3);border-right:1px solid var(--border);display:flex;align-items:flex-start;justify-content:flex-end}
.scell{padding:3px;border-right:.5px solid var(--border);min-height:42px;cursor:pointer;transition:background .1s}
.scell:last-child{border-right:none}
.scell:hover{background:var(--redbg)}
.scell.td{background:var(--bg2)}
.slot{border-radius:5px;padding:3px 5px;font-size:10px;font-weight:600;margin-bottom:2px;cursor:pointer;line-height:1.3}
.slot:hover{opacity:.75}
.sleg{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.sleg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.sleg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
/* FINANSIJE */
.fin2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.fincard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.fincard.accent{border-color:var(--red);background:var(--redbg)}
.finlbl{font-size:11px;color:var(--text3);margin-bottom:4px}
.finval{font-size:22px;font-weight:800;color:var(--text)}
.fincard.accent .finval{color:var(--red)}
.finsub{font-size:11px;color:var(--text3);margin-top:3px}
.periods{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.periods button{padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);font-size:12px;font-weight:500;cursor:pointer;color:var(--text);font-family:inherit}
.periods button.on{background:var(--red);color:#fff;border-color:var(--red)}
.bwrap{display:flex;align-items:flex-end;gap:5px;height:110px;margin-bottom:4px}
.bcol{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;justify-content:flex-end;gap:3px}
.br{width:100%;background:var(--red);border-radius:4px 4px 0 0}
.bv{font-size:10px;font-weight:600;color:var(--text)}
.bl{font-size:9px;color:var(--text3)}
.cbrow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.cbn{font-size:12px;color:var(--text);width:90px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cbt{flex:1;height:18px;background:var(--bg3);border-radius:4px;overflow:hidden}
.cbf{height:100%;border-radius:4px;background:var(--red)}
.cbc{font-size:11px;color:var(--text3);width:40px;text-align:right}
.secc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
.sectl{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:12px}
/* WHATSAPP */
.wacard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.wamsg{background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 12px;font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;margin:8px 0}
/* PROFILE */
.profhdr{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.profav{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;background:var(--redbg);color:var(--red);border:2px solid var(--red)}
.profname{font-size:19px;font-weight:800;color:var(--text)}
.profsub{font-size:12px;color:var(--text3);margin-top:3px}
.profsec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
.profsect{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.profrow{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--border)}
.profrow:last-child{border-bottom:none}
.proflbl{font-size:13px;color:var(--text3)}
.profval{font-size:13px;font-weight:600;color:var(--text);text-align:right}
.profval.red{color:var(--red)}
.profval.green{color:var(--green)}
.profval.amber{color:var(--amber)}
.sdots{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.sdot{width:10px;height:10px;border-radius:2px;background:var(--red);opacity:.7}
.sdot.empty{background:var(--bg3);opacity:1}
.notarea{width:100%;padding:10px;font-size:14px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg);color:var(--text);font-family:inherit;resize:vertical;min-height:80px;margin-top:6px}
/* SETTINGS */
.setrow{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.setlbl{font-size:15px;font-weight:500;color:var(--text)}
.setsub{font-size:12px;color:var(--text3);margin-top:2px}
.tog{width:44px;height:24px;background:var(--border2);border-radius:12px;cursor:pointer;position:relative;flex-shrink:0}
.tog.on{background:var(--red)}
.togk{width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog.on .togk{left:23px}
.langbtns{display:flex;gap:6px;flex-wrap:wrap}
.langbtn{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:var(--rs);border:2px solid var(--border2);background:var(--bg2);cursor:pointer;font-family:inherit;font-size:13px;color:var(--text)}
.langbtn.on{border-color:var(--red);background:var(--redbg);font-weight:700;color:var(--red)}
/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.mbg.on{display:flex}
.modal{background:var(--bg);border-radius:18px 18px 0 0;padding:18px 16px;padding-bottom:calc(22px + var(--sb));width:100%;max-width:500px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mhandle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.mtitle{font-size:17px;font-weight:700;color:var(--text);margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;font-size:15px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg2);color:var(--text);font-family:inherit;-webkit-appearance:none}
.field textarea{resize:vertical;min-height:58px}
.field2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mact{display:flex;gap:8px;margin-top:16px}
.mact .btn{flex:1;text-align:center;padding:12px;font-size:15px}
/* PKG SELECT */
.psgrp{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:5px}
.psopt{border:1px solid var(--border2);border-radius:var(--rs);padding:10px 6px;text-align:center;cursor:pointer;background:var(--bg2)}
.psopt.on{border:2.5px solid var(--red);background:var(--redbg)}
.psopt .pn{font-size:20px;font-weight:800;color:var(--red)}
.psopt .pl{font-size:10px;color:var(--text3)}
.psopt .pp{font-size:13px;font-weight:700;color:var(--text);margin-top:2px}
/* TYPE SELECT */
.tygrp{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:5px}
.tyopt{border:1px solid var(--border2);border-radius:var(--rs);padding:11px 6px;text-align:center;cursor:pointer;background:var(--bg2)}
.tyopt.sp{border:2.5px solid #1a56db;background:#e8f0fe}
.tyopt.ss{border:2.5px solid #059669;background:#e8fff3}
.tyopt.sg{border:2.5px solid var(--red);background:var(--redbg)}
/* RENEW STATUS */
.rsgrp{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:5px}
.rsopt{border:1px solid var(--border2);border-radius:var(--rs);padding:11px;cursor:pointer;background:var(--bg2)}
.rsopt.on{border:2.5px solid var(--red);background:var(--redbg)}
.rslbl{font-size:13px;font-weight:700;color:var(--text)}
.rssub{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4}
.rinfo{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:11px;margin-bottom:12px}
/* COLORS */
.colrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:5px}
.coldot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;flex-shrink:0}
.coldot.on{border-color:var(--text)}
/* CLIENT PICK */
.cplist{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto;margin-top:5px}
.cprow{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer}
.cprow:hover{background:var(--redbg)}
.cprow.on{border-color:var(--red);background:var(--redbg)}
.cpav{width:30px;height:30px;border-radius:50%;background:var(--redbg);color:var(--red);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
/* MEMBER CHECK */
.mchk{width:20px;height:20px;border:2px solid var(--border2);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--bg);flex-shrink:0}
.mchk.on{background:var(--red);border-color:var(--red)}
/* TOAST */
.toast{position:fixed;bottom:calc(76px + var(--sb));left:50%;transform:translateX(-50%) translateY(30px);background:#111;color:#fff;font-size:13px;padding:10px 20px;border-radius:22px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;font-weight:500}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.dark .toast{background:var(--red)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:14px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-logo">
      <div class="hdr-icon"><svg width="18" height="18" viewBox="0 0 100 100"><text y="72" x="50" text-anchor="middle" font-size="62" font-family="Arial Black,sans-serif" fill="white" font-weight="900">SF</text></svg></div>
      <div class="hdr-name">STAMENIC<span>FITT</span></div>
    </div>
    <button class="hdr-btn" id="darkBtn" onclick="togDark()">☀️</button>
  </div>
  <div class="content" id="content"></div>
  <nav class="bnav" id="bnav"></nav>
</div>
<div class="toast" id="toast"></div>

<!-- CLIENT MODAL -->
<div class="mbg" id="mC">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle" id="mCt">Novi klijent</div>
    <div class="field"><label>Ime i prezime</label><input id="fn" placeholder="npr. Ana Popović" autocomplete="name"/></div>
    <div class="field"><label>Paket (opciono)</label><div class="psgrp" id="fpg"></div></div>
    <div class="field"><label>Datum početka</label><input type="date" id="fstart"/></div>
    <div class="field"><label>Status</label>
      <select id="fst">
        <option value="active">Aktivan</option>
        <option value="due">Plaćanje dospelo</option>
        <option value="overdue">Kasni</option>
        <option value="paused">Pauza</option>
      </select>
    </div>
    <div class="mact">
      <button class="btn" onclick="cm('mC')">Otkaži</button>
      <button class="btn btnp" onclick="saveC()">Sačuvaj</button>
    </div>
  </div>
</div>

<!-- RENEW MODAL -->
<div class="mbg" id="mRen">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle" id="mRent">Produži članarinu</div>
    <div class="rinfo" id="mReni"></div>

function now2(){
  var n=new Date();
  return{
    date:n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate()),
    time:pad(n.getHours())+':'+pad(n.getMinutes())
  };
}
function pad(x){return String(x).padStart(2,'0');}
function today(){return now2().date;}
function du(d){var a=new Date();a.setHours(0,0,0,0);var b=new Date(d);b.setHours(0,0,0,0);return Math.round((b-a)/86400000);}
function pkgExp(c){if(!c.pstart)return null;var d=new Date(c.pstart);d.setDate(d.getDate()+30);return d.toISOString().split('T')[0];}
function pgb(id){return pkgs.find(function(p){return p.id===id;});}
function cob(id){return clients.find(function(c){return c.id===id;});}
function ini(n){return n.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);}
function fmtD(d){if(!d)return '—';var a=d.split('-');return a[2]+'/'+a[1]+'/'+a[0];}
function bc(s){return{active:'ba',due:'bd',overdue:'bo',paused:'bp'}[s]||'bp';}
function bl(s){return{active:t('statusActive'),due:t('statusDue'),overdue:t('statusOverdue'),paused:t('statusPaused')}[s]||s;}
function cCol(cid){var C=['#cc2200','#1a56db','#1a7a2e','#9333ea','#059669','#d97706','#0891b2','#be185d'];return C[cid%C.length];}
function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('on');setTimeout(function(){el.classList.remove('on');},2400);}
function om(id){document.getElementById(id).classList.add('on');}
function cm(id){document.getElementById(id).classList.remove('on');}
function theme(){
  document.getElementById('app').className=isDark?'dark':'';
  var b=document.getElementById('darkBtn');

function pgClients(){
  var ac=clients.filter(function(c){return !c.arch;});
  var expiring=ac.filter(function(c){var e=pkgExp(c);return e&&c.st!=='paused'&&du(e)>=0&&du(e)<=7;});
  var completed=ac.filter(function(c){var p=c.pid?pgb(c.pid):null;return p&&(c.pused||0)>=p.s&&c.st!=='paused';});
  var td=sessions.filter(function(s){return s.date===today();}).length;
  var arc=clients.filter(function(c){return c.arch;}).length;

  var notifExp=expiring.length ? buildNotif(expiring,false) : '';
  var notifDone=completed.length ? buildNotif(completed,true) : '';

  var filterChips='';
  if(groups.length){
    filterChips='<div class="frow" id="grpfilter"></div>';
  }

  var displayList=filterGrp ? ac.filter(function(c){
    var g=groups.find(function(gr){return String(gr.id)===String(filterGrp);});
    return g&&g.members&&g.members.indexOf(c.id)>-1;
  }) : ac;

  return notifExp+notifDone+
    '<div class="topbar"><div class="ptitle">'+t('clients')+'</div><button class="btn btnp" onclick="openCM()">+ Novi</button></div>'+
    '<div class="sgrid" style="grid-template-columns:1fr 1fr">'+
      '<div class="sc"><div class="sl">'+t('active')+'</div><div class="sv">'+ac.length+'</div></div>'+
      '<div class="sc"><div class="sl">'+t('today')+'</div><div class="sv">'+td+'</div></div>'+
    '</div>'+
    filterChips+
    '<div class="sw"><input placeholder="'+t('search')+'" oninput="filterClients(this.value)"/></div>'+
    '<div class="clist" id="clist">'+renderCards(displayList)+'</div>'+
    (arc?'<div style="text-align:center;margin-top:14px"><button class="btn btnsm" onclick="setTab(\'arhiva\')">📦 '+t('archive')+' ('+arc+')</button></div>':'');
}

function buildNotif(list,isDone){
  var col=isDone?'green':'';
  var title=isDone?t('completedPkgs'):t('expiringSoon');
  var items=list.map(function(c){
    var d=pkgExp(c)?du(pkgExp(c)):0;
    var when=isDone?t('completedJust'):(d===0?t('today2'):d===1?t('tomorrow'):t('inDays')+d+t('days'));
    return '<div class="nitem '+col+'">'+c.name+' — '+when+'</div>';
  }).join('');
  return '<div class="notif on '+col+'"><div class="ntitle '+col+'">'+title+'</div>'+items+'</div>';
}

function renderCards(list){
  if(!list.length)return '<div class="empty">'+t('noClients')+'</div>';
  return list.map(function(c){
    var p=c.pid?pgb(c.pid):null;
    var e=pkgExp(c),dl=e?du(e):null;
    var used=c.pused||0,total=p?p.s:0;
    var pct=total?Math.min(100,Math.round(used/total*100)):0;
    var isDone=total>0&&used>=total;
    var chk=sessions.some(function(s){return s.cid===c.id&&s.date===today();});
    var ts=sessions.find(function(s){return s.cid===c.id&&s.date===today();});
    var warn=(!isDone&&dl!==null&&dl>=0&&dl<=7&&c.st!=='paused')?(dl===0?t('expToday'):dl===1?t('expTomorrow'):t('expDays')+dl+t('days')):'';
    var renewed=c.rat&&du(c.rat)>=-3&&du(c.rat)<=0;
    var cgs=groups.filter(function(g){return g.members&&g.members.indexOf(c.id)>-1;});

    var cls='cc'+(chk?' trained':'')+(isDone?' completed':warn?' expiring':'');
    return '<div class="'+cls+'">'+
      '<div class="ctop">'+
        '<div class="chk'+(chk?' on':'')+'" data-train="'+c.id+'">'+
          '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><polyline points="2,6.5 5,9.5 11,3" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
        '</div>'+
        '<div class="av">'+ini(c.name)+'</div>'+
        '<div class="ci">'+
          '<div class="cn" data-prof="'+c.id+'">'+c.name+'</div>'+
          '<div class="cmeta">'+
            (p?'<span class="tchip '+TC[p.t]+'">'+TL[p.t]+'</span>':'')+
            (p?'<span>'+p.s+' '+t('sessions')+' · €'+p.p+'</span>':'<span style="color:var(--text3)">'+t('noPackage')+'</span>')+
            (e?'<span>· '+fmtD(e)+'</span>':'')+
            cgs.map(function(g){return '<span class="grpchip" style="background:'+g.color+'22;color:'+g.color+';border-color:'+g.color+'44">'+g.name+'</span>';}).join('')+
          '</div>'+
          (ts?'<div class="cstamp">'+t('trainedAt')+ts.time+'</div>':'')+
          (isDone?'<div class="cdone">'+t('doneMsg')+'</div>':warn?'<div class="cwarn">'+warn+'</div>':
            (p&&total>0?'<div style="font-size:11px;color:var(--text3);margin-top:2px">'+used+t('sessUsed')+total+t('sessLabel')+'</div>':''))+
          (renewed?'<div class="crenew">'+t('renewed')+fmtD(c.rat)+(c.rn?' · '+c.rn:'')+'</div>':'')+
        '</div>'+
        '<div class="cr">'+
          '<span class="bdg '+bc(c.st)+'">'+bl(c.st)+'</span>'+
          (p?'<span class="ptag'+(isDone?' style="background:var(--gbg);color:var(--green)"':'')+'">'+used+'/'+total+'</span>':'')+
        '</div>'+
      '</div>'+
      (p?'<div class="prow"><div class="pbar"><div class="pfill'+(isDone?' full':'')+'" style="width:'+pct+'%"></div></div><span class="plbl'+(isDone?' style="color:var(--green);font-weight:600"':'')+'">'+pct+'%</span></div>':'')+
      '<div class="cact">'+
        '<button class="btn btng btnsm" data-renew="'+c.id+'">'+t('renew')+'</button>'+
        '<button class="btn btnsm" data-edit="'+c.id+'">'+t('edit')+'</button>'+
        '<button class="btn btnsm btna" data-arch="'+c.id+'">'+t('archiveBtn')+'</button>'+
        '<button class="btn btnsm btnr" data-delc="'+c.id+'">'+t('delForever')+'</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

// // --- TRAIN TOGGLE -----------------------------------------
function togTrain(cid){
  var d=now2(),c=cob(cid),ex=sessions.find(function(s){return s.cid===cid&&s.date===d.date;});
  if(ex){
    sessions=sessions.filter(function(s){return !(s.cid===cid&&s.date===d.date);});
    if(c&&c.pused>0)c.pused--;
    // Remove matching slot from schedule
    slots=slots.filter(function(s){return !(s.cid===cid&&s.date===d.date&&s.auto);});
    sv();renderPage();toast(t('trainRemoved'));
  } else {
    sessions.push({id:Date.now(),cid:cid,date:d.date,time:d.time,dur:60,type:'Kombinirano',note:'Brzi unos'});
    if(c)c.pused=(c.pused||0)+1;
    // Also add to schedule as auto-slot
    var roundedTime=pad(Math.min(21,Math.max(6,parseInt(d.time.split(':')[0]))))+':'+( parseInt(d.time.split(':')[1])>=30?'30':'00');
    slots.push({id:Date.now()+1,cid:cid,date:d.date,time:roundedTime,dur:60,note:'',auto:true});
    var p=c&&c.pid?pgb(c.pid):null;
    var justDone=p&&(c.pused||0)>=p.s;
    sv();renderPage();
    toast(justDone?'🎉 '+c.name.split(' ')[0]+' — '+t('completedJust'):t('trainedAt')+d.time);
  }
}

function getTests(cid){
  var c=cob(cid);
  return (c&&c.isoTests)?c.isoTests:[];

var ISO_EXERCISES=[
  {key:'vp',name:'Vertical Pull',icon:'🔼',sides:false},
  {key:'kpR',name:'Kvadriceps Pull (D)',icon:'🦵',sides:false},
  {key:'kpL',name:'Kvadriceps Pull (L)',icon:'🦵',sides:false},
  {key:'zlR',name:'Zadnja Loza (D)',icon:'🦿',sides:false},
  {key:'zlL',name:'Zadnja Loza (L)',icon:'🦿',sides:false},
  {key:'pr',name:'Prednje Rame',icon:'🏋️',sides:false},
  {key:'bi',name:'Biceps',icon:'💪',sides:false},
  {key:'sq',name:'Čučanj sa Pojasom',icon:'🏋️',sides:false},
  {key:'sk',name:'Sklek',icon:'👐',sides:false}
];

function buildTestSection(cid){
  var tests=getTests(cid);

  // FORM: each exercise has 3 attempts
  var formRows=ISO_EXERCISES.map(function(ex){
    return '<div style="display:flex;align-items:center;gap:5px;margin-bottom:5px">'+
      '<div style="font-size:11px;font-weight:600;color:var(--text);width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+ex.name+'">'+ex.icon+' '+ex.name+'</div>'+
      '<input id="iso_'+ex.key+'_1" type="number" step="any" inputmode="decimal" placeholder="1." style="flex:1;min-width:0;padding:6px 2px;font-size:13px;border:1px solid var(--border2);border-radius:4px;background:var(--bg2);color:var(--text);font-family:inherit;text-align:center"/>'+
      '<input id="iso_'+ex.key+'_2" type="number" step="any" inputmode="decimal" placeholder="2." style="flex:1;min-width:0;padding:6px 2px;font-size:13px;border:1px solid var(--border2);border-radius:4px;background:var(--bg2);color:var(--text);font-family:inherit;text-align:center"/>'+
      '<input id="iso_'+ex.key+'_3" type="number" step="any" inputmode="decimal" placeholder="3." style="flex:1;min-width:0;padding:6px 2px;font-size:13px;border:1px solid var(--border2);border-radius:4px;background:var(--bg2);color:var(--text);font-family:inherit;text-align:center"/>'+
    '</div>';
  }).join('');

  // HISTORY
  var history='';
  if(tests.length){
    history=tests.slice().reverse().map(function(te,idx){
      var realIdx=tests.length-1-idx;

      // --- RESULTS TABLE (Avg + Max per exercise) ---
      var tableRows=ISO_EXERCISES.map(function(ex){
        var d=te.data&&te.data[ex.key];
        if(!d)return '';
        var avg=d.avg||0;
        var maxV=Math.max(d.v1||0,d.v2||0,d.v3||0);
        return '<tr>'+
          '<td style="padding:5px 6px;font-size:12px;color:var(--text);white-space:nowrap">'+ex.icon+' '+ex.name+'</td>'+
          '<td style="padding:5px 4px;font-size:11px;color:var(--text3);text-align:center">'+(d.v1||'—')+'</td>'+
          '<td style="padding:5px 4px;font-size:11px;color:var(--text3);text-align:center">'+(d.v2||'—')+'</td>'+
          '<td style="padding:5px 4px;font-size:11px;color:var(--text3);text-align:center">'+(d.v3||'—')+'</td>'+
          '<td style="padding:5px 6px;font-size:12px;font-weight:700;color:var(--red);text-align:center">'+avg.toFixed(1)+'</td>'+
          '<td style="padding:5px 6px;font-size:12px;font-weight:700;color:var(--green);text-align:center">'+maxV+'</td>'+
        '</tr>';
      }).filter(function(r){return r;}).join('');

      var resultsTable='<div style="overflow-x:auto;margin-bottom:12px">'+
        '<table style="width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;font-family:inherit">'+
          '<thead><tr style="background:var(--bg2)">'+
            '<th style="padding:6px;font-size:11px;color:var(--text2);text-align:left;font-weight:700">Vežba</th>'+
            '<th style="padding:6px;font-size:10px;color:var(--text3);text-align:center;font-weight:600">1.</th>'+
            '<th style="padding:6px;font-size:10px;color:var(--text3);text-align:center;font-weight:600">2.</th>'+
            '<th style="padding:6px;font-size:10px;color:var(--text3);text-align:center;font-weight:600">3.</th>'+
            '<th style="padding:6px;font-size:11px;color:var(--red);text-align:center;font-weight:700">Avg</th>'+
            '<th style="padding:6px;font-size:11px;color:var(--green);text-align:center;font-weight:700">Max</th>'+
          '</tr></thead>'+
          '<tbody>'+tableRows+'</tbody>'+
        '</table>'+
      '</div>';

      // --- DISBALANCE ANALYSIS (D vs L) ---
      var pairs=[
        {nameR:'kpR',nameL:'kpL',label:'Kvadriceps Pull'},
        {nameR:'zlR',nameL:'zlL',label:'Zadnja Loza'}
      ];
      var disbalanceRows=pairs.map(function(pair){
        var dR=te.data&&te.data[pair.nameR];
        var dL=te.data&&te.data[pair.nameL];
        if(!dR&&!dL)return '';
        var avgR=dR?dR.avg:0;
        var avgL=dL?dL.avg:0;
        var maxR=dR?Math.max(dR.v1||0,dR.v2||0,dR.v3||0):0;
        var maxL=dL?Math.max(dL.v1||0,dL.v2||0,dL.v3||0):0;
        var bigger=avgR>=avgL?'D':'L';
        var smaller=avgR>=avgL?'L':'D';
        var diff=Math.abs(avgR-avgL);
        var maxAvg=Math.max(avgR,avgL);
        var pct=maxAvg>0?Math.round(diff/maxAvg*100):0;
        var barR=maxAvg>0?Math.round(avgR/maxAvg*100):0;
        var barL=maxAvg>0?Math.round(avgL/maxAvg*100):0;
        var status=pct<=5?'Odlično':pct<=10?'OK':pct<=15?'Umereni disbalans':'Značajan disbalans';
        var statusCol=pct<=5?'var(--green)':pct<=10?'var(--amber)':pct<=15?'#e65100':'var(--red)';
        var statusBg=pct<=5?'var(--gbg)':pct<=10?'var(--abg)':pct<=15?'#fff3e0':'var(--redbg)';

        return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px">'+
          '<div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px">'+pair.label+'</div>'+
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'+
            '<div style="width:24px;font-size:11px;font-weight:700;color:var(--text2)">D</div>'+
            '<div style="flex:1;height:20px;background:var(--bg3);border-radius:4px;overflow:hidden;position:relative">'+
              '<div style="height:100%;width:'+barR+'%;background:var(--red);border-radius:4px;transition:width .3s"></div>'+
            '</div>'+
            '<div style="width:55px;font-size:13px;font-weight:700;color:var(--text);text-align:right">'+avgR.toFixed(1)+' kg</div>'+
          '</div>'+
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
            '<div style="width:24px;font-size:11px;font-weight:700;color:var(--text2)">L</div>'+
            '<div style="flex:1;height:20px;background:var(--bg3);border-radius:4px;overflow:hidden;position:relative">'+
              '<div style="height:100%;width:'+barL+'%;background:#1a56db;border-radius:4px;transition:width .3s"></div>'+
            '</div>'+
            '<div style="width:55px;font-size:13px;font-weight:700;color:var(--text);text-align:right">'+avgL.toFixed(1)+' kg</div>'+
          '</div>'+
          '<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:'+statusBg+';border-radius:var(--rs)">'+
            '<div style="font-size:12px;color:'+statusCol+';font-weight:600">'+status+'</div>'+
            '<div style="font-size:12px;color:'+statusCol+'">Razlika: '+diff.toFixed(1)+' kg ('+pct+'%) — '+bigger+' jača</div>'+
          '</div>'+
        '</div>';
      }).filter(function(r){return r;}).join('');

      var disbalanceSection=disbalanceRows?
        '<div style="margin-top:4px;margin-bottom:4px">'+
          '<div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px">⚖️ Analiza disbalansa D / L</div>'+
          disbalanceRows+
        '</div>':'';

      return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:12px;margin-bottom:12px">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'+
          '<div><div style="font-size:14px;font-weight:700;color:var(--text)">'+fmtD(te.date)+'</div>'+
          (te.note?'<div style="font-size:11px;color:var(--text3);margin-top:2px">'+te.note+'</div>':'')+
          '</div>'+
          '<button class="btn btnsm btnr" style="padding:3px 8px;font-size:11px" onclick="window.delTestNow('+cid+','+realIdx+');event.stopPropagation();">×</button>'+
        '</div>'+
        resultsTable+
        disbalanceSection+
      '</div>';
    }).join('');
  } else {
    history='<div style="font-size:13px;color:var(--text3);text-align:center;padding:16px 0">'+t('noTests')+'</div>';
  }

  return '<div class="profsec">'+
    '<div class="profsect">🧪 '+t('testing')+'</div>'+
    '<div style="font-size:12px;color:var(--text3);margin-bottom:10px">Izometrija — 3 pokušaja po vežbi, pozicija 6 sec. Vrednosti u kg.</div>'+
    formRows+
    '<div style="display:flex;gap:8px;margin-bottom:6px">'+
      '<div style="flex:1"><div style="font-size:11px;color:var(--text2);margin-bottom:4px">📅 Datum</div><input id="iso_date" type="date" value="'+today()+'" style="width:100%;padding:8px;font-size:13px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg2);color:var(--text);font-family:inherit;-webkit-appearance:none"/></div>'+
      '<div style="flex:1"><div style="font-size:11px;color:var(--text2);margin-bottom:4px">📝 Napomena</div><input id="iso_note" placeholder="opciono..." style="width:100%;padding:8px;font-size:13px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg2);color:var(--text);font-family:inherit"/></div>'+
    '</div>'+
    '<button class="btn btnp btnsm" style="width:100%;padding:10px;margin-top:6px" onclick="addTest('+cid+')">'+t('addTest')+'</button>'+
    '<div style="font-size:13px;font-weight:700;color:var(--text2);margin:16px 0 10px">'+t('testHistory')+'</div>'+
    history+
  '</div>';
}

function addTest(cid){
  var i=clients.findIndex(function(c){return c.id===cid;});
  if(i===-1)return;
  if(!clients[i].isoTests)clients[i].isoTests=[];
  var data={};
  var hasVal=false;
  ISO_EXERCISES.forEach(function(ex){
    var v1=Number(document.getElementById('iso_'+ex.key+'_1').value)||0;
    var v2=Number(document.getElementById('iso_'+ex.key+'_2').value)||0;
    var v3=Number(document.getElementById('iso_'+ex.key+'_3').value)||0;
    if(v1||v2||v3){
      var cnt=(v1?1:0)+(v2?1:0)+(v3?1:0);
      var avg=cnt?(v1+v2+v3)/cnt:0;
      data[ex.key]={v1:v1,v2:v2,v3:v3,avg:avg};
      hasVal=true;
    }
  });
  if(!hasVal){toast(t('enterTest'));return;}
  var date=document.getElementById('iso_date').value||today();
  var note=(document.getElementById('iso_note').value||'').trim();
  clients[i].isoTests.push({date:date,data:data,note:note});
  sv();
  openProf(cid);
  toast(t('testSaved'));
}

function delTest(cid,idx){
  if(!confirm(t('confirmDel')))return;
  var i=clients.findIndex(function(c){return c.id===cid;});
  if(i===-1||!clients[i].isoTests)return;
  clients[i].isoTests.splice(idx,1);
  sv();
  openProf(cid);
  toast(t('testDeleted'));
}

// // --- RASPORED PAGE ----------------------------------------
function getWeekStart(off){
  var d=new Date(),dy=d.getDay();
  var diff=d.getDate()-(dy===0?6:dy-1);
  var mon=new Date(d);mon.setDate(diff+off*7);mon.setHours(0,0,0,0);
  return mon;
}
function ds(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}

function pgRaspored(){
  var ws=getWeekStart(weekOff);
  var wdays=[];
  for(var i=0;i<7;i++){var d=new Date(ws);d.setDate(d.getDate()+i);wdays.push(d);}
  var td=today();
  var days=getDays();
  var wlabel=fmtD(ds(wdays[0]))+' – '+fmtD(ds(wdays[6]));

  var head='<div class="shead"><div class="shc" style="font-size:9px">⏰</div>'+
    wdays.map(function(d,i){var dstr=ds(d);var isTd=dstr===td;return '<div class="shc'+(isTd?' td':'')+'">'+days[i]+'<div style="font-size:13px;font-weight:'+(isTd?'800':'600')+'">'+d.getDate()+'</div></div>';}).join('')+'</div>';

  var rows=HOURS.map(function(hr){
    var cells=wdays.map(function(d,di){
      var dstr=ds(d),isTd=dstr===td;
      var dslots=slots.filter(function(s){return s.date===dstr&&s.time===hr;});
      var dots=dslots.map(function(s){var c=cob(s.cid);var col=c?cCol(c.id):'#888';var nm=c?c.name.split(' ')[0]:'?';
        return '<div class="slot" data-eslot="'+s.id+'" style="background:'+col+'22;color:'+col+';border-left:3px solid '+col+'">'+nm+(s.note?'<div style="font-size:9px;opacity:.8">'+s.note+'</div>':'')+'<div style="font-size:9px;opacity:.7">'+s.dur+'m</div></div>';
      }).join('');
      return '<div class="scell'+(isTd?' td':'')+'" data-nslot="1" data-date="'+dstr+'" data-hour="'+hr+'">'+dots+'</div>';
    }).join('');
    return '<div class="srow"><div class="stime">'+hr+'</div>'+cells+'</div>';
  }).join('');

  var usedCids=[];
  slots.forEach(function(s){var sd=new Date(s.date);if(sd>=ws&&sd<=wdays[6]&&usedCids.indexOf(s.cid)===-1)usedCids.push(s.cid);});
  var leg=usedCids.length?'<div class="sleg">'+usedCids.map(function(cid){var c=cob(cid);if(!c)return'';var col=cCol(cid);return '<div class="sleg-item"><div class="sleg-dot" style="background:'+col+'"></div>'+c.name+'</div>';}).join('')+'</div>':'';

  return '<div class="wnav">'+
    '<button class="btn btnsm" onclick="chgWk(-1)">'+t('prevWeek')+'</button>'+
    '<div style="text-align:center"><div class="wlbl">'+t('schedule')+'</div><div style="font-size:11px;color:var(--text3)">'+wlabel+'</div></div>'+
    '<button class="btn btnsm" onclick="chgWk(1)">'+t('nextWeek')+'</button>'+
  '</div>'+
  (weekOff!==0?'<div style="text-align:center;margin-bottom:10px"><button class="btn btnsm" onclick="chgWk(0,1)">'+t('thisWeek')+'</button></div>':'')+
  '<div style="font-size:12px;color:var(--text3);margin-bottom:10px">Klikni na polje da dodaš termin. Klikni na termin da ga izmeniš.</div>'+
  '<div class="swrap"><div class="stable">'+head+rows+'</div></div>'+leg;
}
function chgWk(d,reset){weekOff=reset?0:weekOff+d;renderPage();}

function buildTimeOpts(sel){
  var times=[],h,m;
  for(h=6;h<=21;h++){for(m=0;m<60;m+=30)times.push(pad(h)+':'+pad(m));}
  return times.map(function(t2){return '<option value="'+t2+'"'+(t2===sel?' selected':'')+'>'+t2+'</option>';}).join('');

function getFinData(per){
  var n=new Date(),nM={'mesec':1,'3meseca':3,'6meseci':6,'godina':12}[per]||1;
  var months=[],labels=[];
  for(var i=nM-1;i>=0;i--){
    var d=new Date(n.getFullYear(),n.getMonth()-i,1);
    months.push({y:d.getFullYear(),m:d.getMonth()+1});
    labels.push(d.toLocaleString('sr-Latn',{month:'short'})+(nM>6?' '+String(d.getFullYear()).slice(2):''));
  }
  var rev=months.map(function(mo){
    return sessions.filter(function(s){var a=s.date.split('-').map(Number);return a[0]===mo.y&&a[1]===mo.m;})
      .reduce(function(sum,s){var c=cob(s.cid);var p=c&&c.pid?pgb(c.pid):null;return sum+(p?Math.round(p.p/p.s):0);},0);
  });
  return{labels:labels,rev:rev};
}
function pgFin(){
  var ac=clients.filter(function(c){return !c.arch;});
  var monthRev=ac.filter(function(c){return c.st==='active'&&c.pid;}).reduce(function(s,c){var p=pgb(c.pid);return s+(p?p.p:0);},0);
  var fd=getFinData(finPer);
  var tot=fd.rev.reduce(function(a,b){return a+b;},0);
  var avg=fd.rev.length?Math.round(tot/fd.rev.length):0;
  var mx=Math.max.apply(null,fd.rev.concat([1]));

  var bars=fd.rev.map(function(v,i){
    return '<div class="bcol"><div class="bv">€'+v+'</div><div class="br" style="height:'+( Math.round(v/mx*95)+4)+'px"></div><div class="bl">'+fd.labels[i]+'</div></div>';
  }).join('');

  var perBtns=['mesec','3meseca','6meseci','godina'].map(function(p){
    var lbl={mesec:t('per1'),'3meseca':t('per3'),'6meseci':t('per6'),godina:t('perY')}[p];
    return '<button class="'+(finPer===p?'on':'')+'" data-fper="'+p+'">'+lbl+'</button>';
  }).join('');

  var topC=ac.map(function(c){var p=c.pid?pgb(c.pid):null;return{name:c.name,rev:p?p.p:0};}).sort(function(a,b){return b.rev-a.rev;}).slice(0,5);
  var mxC=Math.max.apply(null,topC.map(function(x){return x.rev;}).concat([1]));
  var cbars=topC.map(function(x){var pct=Math.round(x.rev/mxC*100);return '<div class="cbrow"><div class="cbn">'+x.name.split(' ')[0]+' '+((x.name.split(' ')[1]||'')[0]||'')+'.</div><div class="cbt"><div class="cbf" style="width:'+pct+'%"></div></div><div class="cbc" style="color:var(--red);font-weight:600">€'+x.rev+'</div></div>';}).join('');

  var pkgRows=pkgs.map(function(p){var cnt=ac.filter(function(c){return c.pid===p.id&&c.st==='active';}).length;return cnt?'<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:13px;font-weight:600;color:var(--text)">'+(p.n||p.s+' '+t('sessions'))+'</div><div style="font-size:11px;color:var(--text3)">'+cnt+t('activeClients')+'</div></div><div style="font-size:15px;font-weight:700;color:var(--red)">€'+(cnt*p.p)+'/mes.</div></div>':'';}).join('');

  return '<div class="topbar"><div class="ptitle">'+t('finTitle')+'</div></div>'+
    '<div class="fin2">'+
      '<div class="fincard accent"><div class="finlbl">'+t('monthRev')+'</div><div class="finval">€'+monthRev+'</div><div class="finsub">'+ac.filter(function(c){return c.st==='active';}).length+t('activeClients')+'</div></div>'+
      '<div class="fincard"><div class="finlbl">'+t('avgMonth')+'</div><div class="finval">€'+avg+'</div><div class="finsub">'+t('forPeriod')+'</div></div>'+
      '<div class="fincard"><div class="finlbl">'+t('totalPeriod')+'</div><div class="finval">€'+tot+'</div><div class="finsub">'+fd.labels.length+t('months')+'</div></div>'+
      '<div class="fincard"><div class="finlbl">'+t('yearProj')+'</div><div class="finval">€'+monthRev*12+'</div><div class="finsub">'+t('basedOn')+'</div></div>'+
    '</div>'+
    '<div class="periods">'+perBtns+'</div>'+
    '<div class="secc"><div class="sectl">'+t('revPerMonth')+'</div><div class="bwrap">'+bars+'</div></div>'+
    '<div class="secc"><div class="sectl">'+t('revPerClient')+'</div>'+cbars+'</div>'+
    (pkgRows?'<div class="secc"><div class="sectl">'+t('revPerPkg')+'</div>'+pkgRows+'</div>':'');
}

  else toast(t('copied'));
}
